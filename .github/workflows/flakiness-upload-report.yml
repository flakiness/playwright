name: Upload Flakiness.io report
on:
  workflow_run:
    # Must match the name(s) of workflows that produce flakiness-report artifacts
    workflows: ["Tests"]
    types: [completed]

jobs:
  upload-flakiness-report:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event.workflow_run.conclusion == 'failure'
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - name: Install Flakiness CLI
        run: curl -LsSf https://cli.flakiness.io/install.sh | sh

      - name: Download flakiness-report artifact
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: gh run download "$RUN_ID" --name flakiness-report --dir .

      - name: Upload to Flakiness.io
        run: flakiness upload ./flakiness-report/report.json
